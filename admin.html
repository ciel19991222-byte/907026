+<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>文章管理｜品管巡航報</title><style>:root{--orange:#ef7b45;--ink:#29231f;--muted:#7c746d;--line:#e9e2da;--bg:#f7f4ee}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif}.top{height:74px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 4%}.brand{font-weight:900;font-size:1.2rem}.top a{color:var(--muted);text-decoration:none}.layout{width:min(1180px,92%);margin:38px auto;display:grid;grid-template-columns:220px 1fr;gap:28px}.side,.panel{background:#fff;border:1px solid var(--line);border-radius:18px}.side{padding:18px;height:max-content}.side b{display:block;padding:12px 14px;background:var(--ink);color:#fff;border-radius:10px}.side span{display:block;padding:13px 14px;color:var(--muted)}.panel{padding:32px}h1{margin:0 0 5px;font-size:1.8rem}.intro{color:var(--muted);margin:0 0 28px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.full{grid-column:1/-1}label{display:grid;gap:7px;font-weight:700;font-size:.88rem}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:12px;font:inherit}textarea{min-height:190px;resize:vertical}.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}.btn{border:0;border-radius:999px;padding:12px 22px;font-weight:800;cursor:pointer}.draft{background:#eee9e3}.publish{background:var(--orange);color:white}.saved{display:none;margin-top:18px;padding:12px 16px;border-radius:10px;background:#e5f5ee;color:#187753}.posts{margin-top:32px;border-top:1px solid var(--line);padding-top:24px}.post{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--line)}.post small{color:var(--muted)}.delete{border:0;background:#fff0ed;color:#c84c34;border-radius:8px;padding:7px 10px;cursor:pointer}@media(max-width:700px){.layout{grid-template-columns:1fr}.side{display:none}.panel{padding:22px}.grid{grid-template-columns:1fr}.full{grid-column:auto}}</style></head><body><header class="top"><span class="brand">品管巡航報・內容管理</span><a href="index.html">← 回到前台</a></header><main class="layout"><aside class="side"><b>文章管理</b><span>新增文章</span><span>草稿匣</span><span>月刊設定</span></aside><section class="panel"><h1>建立新文章</h1><p class="intro">填寫內容後可儲存草稿，或直接發表至月讀首頁。</p><form id="editor"><div class="grid"><label class="full">文章標題<input name="title" required placeholder="輸入清楚、有吸引力的標題"></label><label>文章分類<select name="category"><option value="quality">醫療品質</option><option value="safety">病人安全</option><option value="team">團隊日常</option><option value="life">生活小品</option></select></label><label>作者／單位<input name="author" required placeholder="例如：林怡君／品質管理部"></label><label>發表日期<input name="date" type="date" required></label><label>標籤<input name="tags" placeholder="以逗號分隔"></label><label class="full">文章內容<textarea name="content" required placeholder="在這裡撰寫文章內容⋯"></textarea></label></div><div class="actions"><button class="btn draft" type="button" data-status="draft">儲存草稿</button><button class="btn publish" type="submit">發表文章</button></div><div class="saved" role="status"></div></form><div class="posts"><h2>已建立文章</h2><div id="post-list"></div></div></section></main><script>const form=document.querySelector('#editor'),notice=document.querySelector('.saved'),postList=document.querySelector('#post-list');form.date.valueAsDate=new Date();function posts(){return JSON.parse(localStorage.getItem('qualityPosts')||'[]')}function render(){const data=posts();postList.innerHTML=data.length?data.map((p,i)=>`<div class="post"><span><b>${p.title}</b><br><small>${p.status==='published'?'已發表':'草稿'}・${p.date}・${p.author}</small></span><button class="delete" data-i="${i}">刪除</button></div>`).join(''):'<p style="color:#7c746d">尚未建立文章</p>'}function save(status){if(!form.reportValidity())return;const data=Object.fromEntries(new FormData(form));data.status=status;const all=posts();all.push(data);localStorage.setItem('qualityPosts',JSON.stringify(all));notice.textContent=status==='published'?'文章已發表，可回到前台查看。':'草稿已儲存。';notice.style.display='block';form.reset();form.date.valueAsDate=new Date();render()}form.addEventListener('submit',e=>{e.preventDefault();save('published')});document.querySelector('.draft').addEventListener('click',()=>save('draft'));postList.addEventListener('click',e=>{if(!e.target.matches('.delete'))return;const all=posts();all.splice(Number(e.target.dataset.i),1);localStorage.setItem('qualityPosts',JSON.stringify(all));render()});render();</script></body></html>
